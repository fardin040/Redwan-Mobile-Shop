name = "redwan-mobile-shop-api"
main = "src/index.js"
compatibility_date = "2024-03-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database (fully on Cloudflare) ─────────────────────────
[[d1_databases]]
binding  = "DB"
database_name = "redwan-mobile-shop-db"
database_id   = "be3a8201-58a7-4a30-985d-391090b5cdb4"

# ── KV Namespaces (Cart & Cache) ──────────────────────────────
[[kv_namespaces]]
binding    = "CART_KV"
id         = "f1f198f366004b1b8a50752ff3f9202a"
preview_id = "fbcc8ab372d84556be172bae698aec16"

[[kv_namespaces]]
binding    = "CACHE_KV"
id         = "971f5995f76040ae8b3c666f913dd12e"
preview_id = "375a6f7252cb45fdb95a580b4a571706"

# ── Non-secret vars ────────────────────────────────────────────
[vars]
NODE_ENV       = "production"
APP_NAME       = "Redwan Mobile Shop"
BKASH_BASE_URL = "https://tokenized.pay.bka.sh/v1.2.0-beta"
NAGAD_BASE_URL = "https://api.mynagad.com"

# ── Secrets (set via: wrangler secret put SECRET_NAME) ────────
# JWT_SECRET                (64-char random string)
# JWT_REFRESH_SECRET        (64-char random string)
# JWT_EXPIRES_IN            e.g. 7d
# JWT_REFRESH_EXPIRES_IN    e.g. 30d
# BKASH_APP_KEY
# BKASH_APP_SECRET
# BKASH_USERNAME
# BKASH_PASSWORD
# NAGAD_MERCHANT_ID
# NAGAD_MERCHANT_PRIVATE_KEY
# TWILIO_ACCOUNT_SID
# TWILIO_AUTH_TOKEN
# TWILIO_PHONE_NUMBER
# SENDER_EMAIL
# CLOUDINARY_NAME
# CLOUDINARY_API_KEY
# CLOUDINARY_API_SECRET
# SSLCOMMERZ_STORE_ID
# SSLCOMMERZ_STORE_PASS
# PATHAO_CLIENT_ID
# PATHAO_CLIENT_SECRET
# PATHAO_USERNAME
# PATHAO_PASSWORD
# STEADFAST_API_KEY
# STEADFAST_SECRET_KEY
# ALLOWED_ORIGINS           e.g. https://yoursite.pages.dev
# FRONTEND_URL              e.g. https://yoursite.pages.dev
