name: redwan-mobile-shop
region: sgp   # Singapore — closest to Bangladesh

# ── Node.js Backend Service ────────────────────────────────────
services:
  - name: api
    source_dir: /backend
    github:
      branch: main
      deploy_on_push: true
    build_command: npm install --legacy-peer-deps
    run_command: node server.js
    http_port: 5000
    instance_count: 1
    instance_size_slug: basic-xxs   # $5/mo — upgrade when needed
    routes:
      - path: /
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "5000"
      - key: APP_NAME
        value: "Redwan Mobile Shop"

      # PostgreSQL — auto-injected from DO managed DB
      - key: DB_HOST
        value: ${redwan-db.HOSTNAME}
      - key: DB_PORT
        value: ${redwan-db.PORT}
      - key: DB_NAME
        value: ${redwan-db.DATABASE}
      - key: DB_USER
        value: ${redwan-db.USERNAME}
      - key: DB_PASSWORD
        value: ${redwan-db.PASSWORD}
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        value: ${redwan-db.DATABASE_URL}

      # Redis — auto-injected from DO managed Redis
      - key: REDIS_URL
        value: ${redwan-cache.REDIS_URL}
      - key: REDIS_HOST
        value: ${redwan-cache.HOSTNAME}
      - key: REDIS_PORT
        value: ${redwan-cache.PORT}
      - key: REDIS_PASSWORD
        value: ${redwan-cache.PASSWORD}

      # JWT Secrets — set manually in dashboard
      - key: JWT_SECRET
        type: SECRET
        value: "REPLACE_WITH_64_CHAR_RANDOM_STRING"
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: JWT_REFRESH_SECRET
        type: SECRET
        value: "REPLACE_WITH_ANOTHER_64_CHAR_RANDOM_STRING"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "30d"

      # CORS — set after you get your app URL
      - key: FRONTEND_URL
        value: "REPLACE_WITH_YOUR_APP_URL"
      - key: ALLOWED_ORIGINS
        value: "REPLACE_WITH_YOUR_APP_URL"

      # bKash Payment Gateway
      - key: BKASH_APP_KEY
        type: SECRET
        value: "REPLACE_WITH_PRODUCTION_KEY"
      - key: BKASH_APP_SECRET
        type: SECRET
        value: "REPLACE_WITH_PRODUCTION_SECRET"
      - key: BKASH_USERNAME
        type: SECRET
        value: "REPLACE_WITH_PRODUCTION_USER"
      - key: BKASH_PASSWORD
        type: SECRET
        value: "REPLACE_WITH_PRODUCTION_PASS"
      - key: BKASH_BASE_URL
        value: "https://tokenized.pay.bka.sh/v1.2.0-beta"

      # Nagad Payment Gateway
      - key: NAGAD_MERCHANT_ID
        type: SECRET
        value: "REPLACE_WITH_MERCHANT_ID"
      - key: NAGAD_MERCHANT_PRIVATE_KEY
        type: SECRET
        value: "REPLACE_WITH_PRIVATE_KEY"
      - key: NAGAD_PUBLIC_KEY
        type: SECRET
        value: "REPLACE_WITH_PUBLIC_KEY"
      - key: NAGAD_BASE_URL
        value: "https://api.mynagad.com"

      # Twilio SMS
      - key: TWILIO_ACCOUNT_SID
        type: SECRET
        value: "REPLACE_WITH_ACCOUNT_SID"
      - key: TWILIO_AUTH_TOKEN
        type: SECRET
        value: "REPLACE_WITH_AUTH_TOKEN"
      - key: TWILIO_PHONE_NUMBER
        value: "REPLACE_WITH_PHONE_NUMBER"

      # Email (Nodemailer)
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        type: SECRET
        value: "REPLACE_WITH_EMAIL"
      - key: SMTP_PASS
        type: SECRET
        value: "REPLACE_WITH_APP_PASSWORD"
      - key: SENDER_EMAIL
        value: "noreply@redwanmobile.com"

      # Cloudinary
      - key: CLOUDINARY_NAME
        value: "REPLACE_WITH_CLOUD_NAME"
      - key: CLOUDINARY_API_KEY
        type: SECRET
        value: "REPLACE_WITH_API_KEY"
      - key: CLOUDINARY_API_SECRET
        type: SECRET
        value: "REPLACE_WITH_API_SECRET"

      # Courier APIs
      - key: PATHAO_API_KEY
        type: SECRET
        value: "REPLACE_WITH_PATHAO_KEY"
      - key: STEADFAST_API_KEY
        type: SECRET
        value: "REPLACE_WITH_STEADFAST_KEY"

# ── Managed PostgreSQL Database ───────────────────────────────
databases:
  - name: redwan-db
    engine: PG
    version: "15"
    size: db-s-1vcpu-1gb   # $15/mo starter — has free trial credit
    num_nodes: 1

  - name: redwan-cache
    engine: REDIS
    version: "7"
    size: db-s-1vcpu-1gb   # $15/mo starter
    num_nodes: 1
